name: Foto diaria TOP PICKS

# Corre tras el cierre de NY (21:30 UTC = 17:30 ET verano / 16:30 ET invierno)
# Siempre después del cierre 16:00 ET todo el año.
on:
  schedule:
    - cron: '30 21 * * 1-5'   # lunes a viernes, 21:30 UTC
  workflow_dispatch:           # permite ejecutarlo manualmente con un botón

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance pandas numpy finvizfinance

      - name: Ejecutar snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python snapshot.py
